name: 🔄 Update Medicine Databases

on:
  schedule:
    - cron: '0 3 1 */2 *'
  workflow_dispatch:
    inputs:
      countries:
        description: 'Landen om te updaten: "be nl de gb fr"'
        required: false
        default: 'be nl de gb fr'
      dry_run:
        description: 'Dry run (alleen preview)'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeer Python dependencies (DE + FR)
        run: pip install openpyxl requests --quiet

      - name: Installeer Node dependencies
        run: npm install

      - name: Update medicijndatabases
        run: |
          COUNTRIES="${{ github.event.inputs.countries || 'be nl de gb fr' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY" = "true" ]; then
            node update.js $COUNTRIES --dry-run
          else
            node update.js $COUNTRIES
          fi

      - name: Controleer op wijzigingen
        id: changes
        run: |
          if git diff --quiet data/countries/ data/last-update.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            TOTAL=$(node -e "try{const l=require('./data/last-update.json');const t=Object.values(l.results||{}).reduce((s,r)=>s+(r.added||0),0);console.log(t)}catch(e){console.log(0)}")
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push bijgewerkte databases
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "apoHouze Update Bot"
          git config user.email "bot@apohouze.app"
          git add data/countries/ data/last-update.json
          git commit -m "🔄 Medicine update: +${{ steps.changes.outputs.total }} nieuwe medicijnen [automated]"
          git push

      - name: Trigger Docker rebuild
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: docker-publish.yml
          token: ${{ secrets.CR_PAT }}

      - name: Geen wijzigingen
        if: steps.changes.outputs.changed != 'true'
        run: echo "✅ Databases zijn al up-to-date."
